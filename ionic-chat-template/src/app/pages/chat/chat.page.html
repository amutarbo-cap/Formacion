<ion-header>
  <ion-toolbar>
    <ion-title>Chat</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">Cerrar sesión</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngFor="let message of messages$ | async; trackBy: message.date" class="message">
    <strong>{{ message.user }}</strong>: {{ message.text }}
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-input
      [formControl]="messageInput"
      placeholder="Escribe un mensaje..."
    ></ion-input>
    <ion-button slot="end" (click)="sendMessage()" [disabled]="!messageInput.valid">
      Enviar
    </ion-button>
  </ion-toolbar>
</ion-footer>
